<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodeStation - 文件管理器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <style>
        .full-modal { display: none; position: fixed; inset: 0; width: 100vw; height: 100vh; background: white; z-index: 9999; flex-direction: column; }
        #ace-editor { flex: 1; width: 100%; height: 100%; font-family: 'Fira Code', 'Cascadia Code', monospace; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .grid-layout { display: grid; grid-template-columns: 45px minmax(150px, 3fr) 170px 100px 90px 150px; align-items: center; gap: 12px; }
        @media (max-width: 1024px) { .grid-layout { grid-template-columns: 40px minmax(120px, 1fr) 145px; } .col-hide { display: none !important; } .action-btns { opacity: 1 !important; transform: none !important; } }
        .clickable { cursor: pointer; transition: all 0.2s ease; }
        .file-item { border-left: 3px solid transparent; transition: all 0.2s; }
        .file-item.checked-row { background-color: #eff6ff !important; border-left-color: #3b82f6 !important; }
        .file-item:hover { background-color: #f8fafc; }
        @media (min-width: 1025px) { .action-btns { opacity: 0; transform: translateX(5px); } .file-item:hover .action-btns { opacity: 1; transform: translateX(0); } }
        .sort-header { cursor: pointer; user-select: none; transition: color 0.2s; white-space: nowrap; }
        .sort-header:hover { color: #3b82f6; }
        .sort-active { color: #3b82f6 !important; font-weight: 900; }
        #content-loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        input[type="checkbox"] { width: 1.15rem; height: 1.15rem; cursor: pointer; accent-color: #2563eb; }
        #login-page { display: flex; position: fixed; inset: 0; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); z-index: 10001; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans select-none overflow-x-hidden">

<!-- 登录页面 -->
<div id="login-page">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-96">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-lg mx-auto mb-4">
                <i class="fas fa-code text-2xl"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-900 italic uppercase">CodeStation</h1>
            <p class="text-xs text-slate-400 font-black uppercase tracking-widest mt-1">请先登录</p>
        </div>
        <form id="login-form">
            <input id="login-username" type="text" placeholder="用户名" class="w-full bg-slate-50 border-none p-4 rounded-2xl focus:ring-2 focus:ring-blue-400 outline-none text-sm font-medium mb-4">
            <input id="login-password" type="password" placeholder="密码" class="w-full bg-slate-50 border-none p-4 rounded-2xl focus:ring-2 focus:ring-blue-400 outline-none text-sm font-medium mb-6">
            <button type="button" id="login-btn" class="w-full bg-slate-900 text-white font-black text-sm uppercase tracking-widest rounded-2xl hover:bg-blue-600 transition shadow-lg py-4 clickable">登 录</button>
        </form>
        <p id="login-error" class="text-red-500 text-xs text-center mt-4 hidden"></p>
    </div>
</div>

<!-- 主内容区域 -->
<div id="main-content" class="hidden">
    <div id="content-loader">
        <div class="flex flex-col items-center max-w-xs text-center">
            <div class="w-10 h-10 border-4 border-slate-200 border-t-blue-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-black text-slate-600 mt-4 uppercase tracking-widest" id="cl-text">准备中...</span>
            <p id="cl-subtext" class="text-[8px] text-slate-400 mt-2 truncate w-full px-4 font-bold uppercase"></p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto py-4 md:py-8 px-3 md:px-6">
        <header class="mb-6 flex flex-wrap justify-between items-center gap-4 px-2">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-code"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black text-slate-900 tracking-tighter italic uppercase leading-none">Code<span class="text-blue-600">Station</span></h1>
                    <p id="status-text" class="text-[8px] font-black text-slate-400 uppercase tracking-widest mt-1">智能云端编辑器</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button id="admin-btn" onclick="showUserManagement()" class="hidden text-[10px] font-black text-blue-600 border border-blue-200 px-4 py-2 rounded-full hover:bg-blue-50 hover:text-blue-700 transition clickable uppercase">用户管理</button>
                <span id="user-display" class="text-xs font-black text-slate-500 uppercase"></span>
                <button onclick="handleLogout()" class="text-[10px] font-black text-red-400 border border-red-200 px-4 py-2 rounded-full hover:bg-red-50 hover:text-red-500 transition clickable uppercase">登出</button>
            </div>
        </header>

        

        <div class="flex flex-col gap-4 mb-4 bg-white p-4 rounded-[2rem] shadow-sm border border-slate-100">
            <div class="flex flex-wrap gap-2 items-center">
                <button onclick="document.getElementById('fileInputBatch').click()" class="px-5 py-2.5 bg-blue-600 text-white text-[10px] font-black rounded-xl uppercase shadow-md clickable">批量上传</button>
                <button onclick="document.getElementById('folderInput').click()" class="px-5 py-2.5 bg-indigo-600 text-white text-[10px] font-black rounded-xl uppercase shadow-md clickable">目录上传</button>
                <button onclick="actionNewFolder()" class="px-5 py-2.5 text-slate-500 border border-slate-200 text-[10px] font-black rounded-xl uppercase clickable">新建目录</button>
                <div class="flex-1 hidden md:block"></div>
                <div id="batch-actions" class="hidden flex flex-wrap items-center gap-2 bg-blue-50/50 p-2 rounded-2xl border border-blue-100">
                    <button onclick="batchDownload()" class="text-[9px] font-black bg-white text-blue-600 px-3 py-1.5 rounded-lg border border-blue-200 hover:bg-blue-600 hover:text-white transition clickable" title="打包选中项">打包</button>
                    <button onclick="setBatchClipboard('copy')" class="text-[9px] font-black bg-white text-blue-600 px-3 py-1.5 rounded-lg border border-blue-200 hover:bg-blue-600 hover:text-white transition clickable" title="复制">复制</button>
                    <button onclick="setBatchClipboard('cut')" class="text-[9px] font-black bg-white text-orange-600 px-3 py-1.5 rounded-lg border border-orange-200 hover:bg-orange-600 hover:text-white transition clickable" title="剪切">剪切</button>
                    <button onclick="handleBatchDelete()" class="text-[9px] font-black bg-white text-red-600 px-3 py-1.5 rounded-lg border border-red-200 hover:bg-red-600 hover:text-white transition clickable" title="删除">删除</button>
                </div>
            </div>
            <button id="btn-paste-batch" onclick="actionBatchPaste()" class="hidden w-full py-4 bg-blue-600 text-white text-xs font-black rounded-2xl animate-pulse uppercase shadow-lg clickable">粘贴到当前位置</button>
            <div class="relative w-full">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-300 text-sm"></i>
                <input id="searchInput" oninput="filterFiles()" type="text" placeholder="输入名称过滤..." class="w-full pl-11 pr-4 py-3 bg-slate-50 border-none rounded-2xl text-sm focus:ring-1 focus:ring-blue-200 outline-none font-medium">
            </div>
        </div>

        <div class="bg-slate-900 rounded-t-[1.5rem] border-x border-t border-slate-900 overflow-hidden">
            <div class="p-4 grid-layout items-center text-[10px] font-black text-slate-500 uppercase tracking-widest leading-none">
                <div class="flex justify-center"><input type="checkbox" id="selectAllHeader" onclick="toggleSelectAll()"></div>
                <div class="sort-header" id="header-name" onclick="handleSortClick('name')">名称 <span class="sort-icon"></span></div>
                <div class="sort-header col-hide text-center" id="header-time" onclick="handleSortClick('modified_at')">修改时间 <span class="sort-icon"></span></div>
                <div class="sort-header col-hide text-center" id="header-type" onclick="handleSortClick('type_label')">类型 <span class="sort-icon"></span></div>
                <div class="sort-header col-hide text-right" id="header-size" onclick="handleSortClick('size')">大小 <span class="sort-icon"></span></div>
                <div class="text-right pr-4 italic">管理</div>
            </div>
        </div>

        <div class="bg-white rounded-b-[1.5rem] shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden min-h-[450px] relative">
            <div id="loader" class="hidden absolute inset-0 bg-white/95 z-50 flex flex-col items-center justify-center">
                <div class="w-10 h-10 border-4 border-slate-100 border-t-blue-500 rounded-full animate-spin"></div>
            </div>
            <ul id="file-list" class="divide-y divide-slate-50">
                <li class="p-24 text-center text-slate-200 font-black italic uppercase text-xs tracking-widest">请先连接 GitHub 仓库...</li>
            </ul>
        </div>

        <nav id="breadcrumb" class="mt-4 flex items-center text-[9px] font-black text-slate-400 px-4 py-3 bg-white border border-slate-100 rounded-full w-full overflow-x-auto whitespace-nowrap custom-scroll uppercase"></nav>
    </div>

    <div id="ideModal" class="full-modal">
        <div class="h-14 bg-slate-900 text-white flex items-center justify-between px-4 shadow-lg shrink-0 border-b border-white/5">
            <div class="flex items-center gap-3">
                <button onclick="closeIDE()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-800 transition clickable"><i class="fas fa-arrow-left text-sm"></i></button>
                <span id="ide-filename" class="font-mono text-[10px] text-blue-400 truncate max-w-[200px] md:max-w-md tracking-tighter uppercase"></span>
            </div>
            <button onclick="saveToGithub()" class="bg-blue-600 px-5 py-1.5 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-blue-900/40 clickable">保存同步</button>
        </div>
        <div id="ace-editor"></div>
    </div>
</div>



<input type="hidden" id="owner">
<input type="hidden" id="repo">
<input type="hidden" id="token">

<input type="file" id="fileInputBatch" class="hidden" multiple onchange="handleBatchUpload(this.files)">
<input type="file" id="folderInput" class="hidden" webkitdirectory onchange="handleBatchUpload(this.files)">

<script>
    console.log('=== Script starting ===');
    window.onerror = function(msg, url, line) {
        console.error('JS Error:', msg, 'at line', line);
    };

    // --- 工具函数 ---
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // --- 加密解密函数 ---
    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function getPasswordKey(password) {
        let key = 0;
        for (let i = 0; i < password.length; i++) {
            key = key * 31 + password.charCodeAt(i);
        }
        return key % 1000000;
    }

    function simpleEncrypt(text, password) {
        if (!text) return '';
        const seed = getPasswordKey(password);
        let result = '';
        for (let i = 0; i < text.length; i++) {
            const code = text.charCodeAt(i);
            const shifted = ((code + seed + i) % 126);
            result += String.fromCharCode(shifted);
        }
        return btoa(result);
    }

    function simpleDecrypt(encrypted, password) {
        if (!encrypted) return '';
        try {
            const seed = getPasswordKey(password);
            const decoded = atob(encrypted);
            let result = '';
            for (let i = 0; i < decoded.length; i++) {
                const code = decoded.charCodeAt(i);
                const shifted = ((code - seed - i) % 126 + 126) % 126;
                result += String.fromCharCode(shifted);
            }
            return result;
        } catch (e) {
            console.error('解密错误:', e);
            return '';
        }
    }

    // 别名 - 保留向后兼容
    const xorEncrypt = simpleEncrypt;
    const xorDecrypt = simpleDecrypt;

    // --- 数据库变量 ---
    let db = null;
    let currentUser = null;
    let currentPassword = '';

    // --- 登录函数 ---
    async function doLogin() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();

        if (!username || !password) {
            alert('请输入用户名和密码');
            return;
        }

        try {
            const result = db.exec('SELECT id, username, password_hash, salt, owner, repo, token_encrypted FROM users WHERE username = ?', [username]);
            if (result.length === 0 || result[0].values.length === 0) {
                alert('用户不存在');
                return;
            }

            const row = result[0].values[0];
            const storedHash = row[2];
            const salt = row[3];
            const passwordHash = await sha256(password + salt);

            if (passwordHash !== storedHash) {
                alert('密码错误');
                return;
            }

            currentUser = {
                id: row[0],
                username: row[1],
                owner: row[4],
                repo: row[5],
                tokenEncrypted: row[6]
            };
            currentPassword = password;

            const token = xorDecrypt(currentUser.tokenEncrypted, password);

            localStorage.setItem('logged_user', JSON.stringify(currentUser));
            localStorage.setItem('logged_password', password);

            document.getElementById('owner').value = currentUser.owner || '';
            document.getElementById('repo').value = currentUser.repo || '';
            document.getElementById('token').value = token;

            showMainContent();

            if (currentUser.owner && currentUser.repo && token) {
                fetchRepoContents('');
            } else {
                alert('Token解密失败');
            }
        } catch (e) {
            alert('登录失败: ' + e.message);
        }
    }

    // --- 初始化 ---
    window.onload = async () => {
        // 绑定登录按钮 - 根据模式选择登录方式
        document.getElementById('login-btn').addEventListener('click', async () => {
            if (loginMode === 'api') {
                await doLoginAPI();
            } else {
                await doLogin();
            }
        });

        // 尝试API模式
        try {
            const testRes = await fetch('/api/users', {method: 'GET'});
            if (testRes.ok && testRes.headers.get('content-type')?.includes('application/json')) {
                loginMode = 'api';
                console.log('使用API模式登录');
            } else {
                throw new Error('不是有效的API响应');
            }
        } catch (e) {
            // API不可用，切换到本地sql.js模式
            console.log('API不可用，使用本地sql.js模式:', e.message);
            loginMode = 'local';
            await initDatabase();
        }

        // 恢复登录状态
        const savedUser = localStorage.getItem('logged_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            currentPassword = localStorage.getItem('logged_password') || '';

            if (loginMode === 'api') {
                // API模式：重新获取用户信息
                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username: currentUser.username, password: currentPassword})
                    });
                    const data = await res.json();
                    if (data.success) {
                        currentUser = data.user;
                        document.getElementById('owner').value = currentUser.owner || '';
                        document.getElementById('repo').value = currentUser.repo || '';
                        document.getElementById('token').value = currentUser.token || '';
                        showMainContent();
                        if (currentUser.owner && currentUser.repo && currentUser.token) {
                            fetchRepoContents('');
                        }
                    } else {
                        handleLogout();
                    }
                } catch (e) {
                    console.error('恢复登录失败', e);
                }
            } else {
                // 本地模式
                showMainContent();
                if (currentUser.tokenEncrypted && currentPassword) {
                    const result = db.exec('SELECT token_encrypted FROM users WHERE id = ?', [currentUser.id]);
                    if (result.length > 0 && result[0].values.length > 0) {
                        const tokenEnc = result[0].values[0][0];
                        const token = xorDecrypt(tokenEnc, currentPassword);
                        document.getElementById('owner').value = currentUser.owner || '';
                        document.getElementById('repo').value = currentUser.repo || '';
                        document.getElementById('token').value = token;
                        if (currentUser.owner && currentUser.repo && token) {
                            fetchRepoContents('');
                        }
                    }
                }
            }
        }
    };

    async function initDatabase() {
        try {
            const response = await fetch('/api.db');
            if (!response.ok) throw new Error('无法读取api.db');
            const buffer = await response.arrayBuffer();
            const SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` });
            db = new SQL.Database(new Uint8Array(buffer));
            console.log('本地数据库加载成功');
            return true;
        } catch (e) {
            console.error('本地数据库加载失败:', e);
            return false;
        }
    }

    function showMainContent() {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('user-display').innerHTML = `<i class="fas fa-user-circle mr-1"></i>${currentUser.username}`;
        // 只在API模式下显示用户管理按钮
        if (loginMode === 'api') {
            document.getElementById('admin-btn').classList.remove('hidden');
        }
    }

    function handleLogout() {
        localStorage.removeItem('logged_user');
        localStorage.removeItem('logged_password');
        currentUser = null;
        currentPassword = '';
        loginMode = 'api';
        document.getElementById('admin-btn').classList.add('hidden');
        location.reload();
    }

    // --- 文件管理器原有功能 ---
    let currentPath = localStorage.getItem('gh_last_path') || "";
    let allFiles = [], sortConfig = { key: 'name', dir: 'asc' };
    let editor, activeFile, selectedItems = [], clipboard = { items: [], action: null };
    const collator = new Intl.Collator('zh-Hans-CN', { numeric: true, sensitivity: 'base' });

    async function actionEdit(file) {
        activeFile = file;
        document.getElementById('ideModal').style.display = 'flex';
        document.getElementById('ide-filename').innerText = file.path;
        document.body.style.overflow = 'hidden';

        if (!editor) {
            editor = ace.edit("ace-editor");
            editor.setTheme("ace/theme/tomorrow_night");
            editor.setOptions({
                fontSize: "15px",
                tabSize: 2,
                wrap: true,
                showPrintMargin: false,
                scrollPastEnd: 0.5,
                vScrollBarAlwaysVisible: true,
                fixedWidthGutter: true,
                fadeFoldWidgets: true,
                useSoftTabs: true,
                useWorker: false
            });
        }

        const ext = file.name.split('.').pop().toLowerCase();
        const mode = { html:'html', js:'javascript', css:'css', md:'markdown', py:'python', json:'json' }[ext] || 'text';
        editor.session.setMode(`ace/mode/${mode}`);

        showContentLoader(true, "正在提取源代码...");
        try {
            const res = await fetch(file.download_url);
            const code = await res.text();
            editor.setValue(code, -1);
        } catch (e) { alert("读取失败"); }
        finally { showContentLoader(false); }
        editor.focus();
    }

    function closeIDE() {
        document.getElementById('ideModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    async function fetchRepoContents(path) {
        const owner = document.getElementById('owner').value.trim(), repo = document.getElementById('repo').value.trim(), token = document.getElementById('token').value.trim();
        if (!owner || !repo) return;
        localStorage.setItem('gh_owner', owner); localStorage.setItem('gh_repo', repo); localStorage.setItem('gh_token', token);
        localStorage.setItem('gh_last_path', path); currentPath = path;
        clearSelection(); showLoader(true);
        try {
            const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?t=${Date.now()}`, { headers: token ? { 'Authorization': `token ${token}` } : {} });
            let data = await res.json();
            if(!Array.isArray(data)) data = [data];
            data.forEach(f => { f.type_label = getFileTypeLabel(f.name, f.type === 'dir'); f.modified_at = null; });
            allFiles = data;
            applySortingAndRender(); updateBreadcrumb(path);
            autoFetchTimestamps(owner, repo, token);
        } catch (e) { alert("仓库连接失败"); } finally { showLoader(false); }
    }

    async function autoFetchTimestamps(o, r, t) {
        const promises = allFiles.map(async (f) => {
            try {
                const res = await fetch(`https://api.github.com/repos/${o}/${r}/commits?path=${f.path}&per_page=1`, { headers: t ? { 'Authorization': `token ${t}` } : {} });
                const commits = await res.json();
                if (commits?.length) f.modified_at = commits[0].commit.committer.date;
            } catch (e) {}
        });
        await Promise.all(promises);
        applySortingAndRender();
    }

    function renderFiles(files) {
        const list = document.getElementById('file-list');
        list.innerHTML = "";
        if (currentPath) {
            const up = document.createElement('li');
            up.className = "p-4 cursor-pointer text-blue-500 font-black hover:bg-slate-50 flex items-center text-[9px] uppercase tracking-widest clickable";
            up.innerHTML = `<i class="fas fa-level-up-alt mr-3 ml-12"></i> .. 返回上一级`;
            up.onclick = () => { let p = currentPath.split('/'); p.pop(); fetchRepoContents(p.join('/')); };
            list.appendChild(up);
        }
        files.forEach(file => {
            const isDir = file.type === 'dir', canEdit = file.name.match(/\.(html|css|js|md|txt|json|xml|py|php|sql|c|cpp)$/i);
            const timeStr = file.modified_at ? new Date(file.modified_at).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g,'-') : '读取中...';
            const sizeStr = isDir ? '--' : (file.size/1024).toFixed(1) + ' KB';
            const isChecked = selectedItems.some(i => i.path === file.path);
            const previewUrl = `https://web.tuchong.tk/${file.path}`;

            const li = document.createElement('li');
            li.className = `file-item p-4 grid-layout clickable ${isChecked ? 'checked-row' : ''}`;
            li.innerHTML = `

    async function handleBatchUpload(fileList) {
        if (!fileList.length) return;
        const owner = localStorage.getItem('gh_owner'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
        showContentLoader(true, `开始上传任务...`);
        try {
            for (let i = 0; i < fileList.length; i++) {
                const file = fileList[i];
                const relPath = file.webkitRelativePath || file.name;
                const targetPath = currentPath ? `${currentPath}/${relPath}` : relPath;
                const existing = allFiles.find(f => f.name === relPath.split('/').pop());
                let sha = null;
                if (existing && !confirm(`文件 "${relPath}" 已存在，确认覆盖？`)) continue;
                if (existing) sha = existing.sha;
                document.getElementById('cl-text').innerText = `正在传送 (${i+1}/${fileList.length})`;
                const base64 = await blobToBase64(file);
                await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${targetPath}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ message: "Upload", content: base64, sha: sha })
                });
            }
            fetchRepoContents(currentPath);
        } finally { showContentLoader(false); }
    }

    async function handleBatchDelete() {
        if (!selectedItems.length || !confirm("确认永久删除选定项？")) return;
        const o = localStorage.getItem('gh_owner'), r = localStorage.getItem('gh_repo'), t = localStorage.getItem('gh_token');
        showContentLoader(true, "清理中...");
        try {
            async function delRec(item) {
                if (item.type === 'dir') {
                    const res = await fetch(`https://api.github.com/repos/${o}/${r}/contents/${item.path}`, { headers:{'Authorization':`token ${t}`} });
                    const items = await res.json();
                    for (let s of items) await delRec(s);
                } else {
                    document.getElementById('cl-subtext').innerText = `删除: ${item.name}`;
                    await fetch(`https://api.github.com/repos/${o}/${r}/contents/${item.path}`, {
                        method: 'DELETE', headers: { 'Authorization': `token ${t}` },
                        body: JSON.stringify({ message: "Clean", sha: item.sha })
                    });
                }
            }
            for (let item of selectedItems) await delRec(item);
            fetchRepoContents(currentPath);
        } finally { showContentLoader(false); }
    }

    async function actionBatchPaste() {
        showContentLoader(true, "正在同步迁移...");
        try {
            async function cpRec(sP, tP) {
                const res = await fetch(`https://api.github.com/repos/${localStorage.getItem('gh_owner')}/${localStorage.getItem('gh_repo')}/contents/${sP}`, { headers: {'Authorization':`token ${localStorage.getItem('gh_token')}`} });
                const items = await res.json();
                for (let i of items) {
                    const nextT = `${tP}/${i.name}`;
                    if(i.type==='dir') await cpRec(i.path, nextT);
                    else await fetch(`https://api.github.com/repos/${localStorage.getItem('gh_owner')}/${localStorage.getItem('gh_repo')}/contents/${nextT}`, { method:'PUT', headers:{'Authorization':`token ${localStorage.getItem('gh_token')}`}, body: JSON.stringify({message:"Paste", content: await blobToBase64(await (await fetch(i.download_url)).blob())}) });
                }
            }
            for (let item of clipboard.items) {
                const target = currentPath ? `${currentPath}/${item.name}` : item.name;
                if(item.type === 'dir') await cpRec(item.path, target);
                else await fetch(`https://api.github.com/repos/${localStorage.getItem('gh_owner')}/${localStorage.getItem('gh_repo')}/contents/${target}`, { method:'PUT', headers:{'Authorization':`token ${localStorage.getItem('gh_token')}`}, body: JSON.stringify({message:"Paste", content: await blobToBase64(await (await fetch(item.download_url)).blob())}) });
                if(clipboard.action==='cut') await delRecSimple(item);
            }
            clipboard = { items: [], action: null }; document.getElementById('btn-paste-batch').classList.add('hidden'); fetchRepoContents(currentPath);
        } finally { showContentLoader(false); }
    }

    function blobToBase64(b) { return new Promise(r => { const f = new FileReader(); f.onloadend = () => r(f.result.split(',')[1]); f.readAsDataURL(b); }); }
    async function singleFileDownload(f) { showContentLoader(true, "准备中..."); try { const r = await fetch(f.download_url); saveAs(await r.blob(), f.name); } catch(e) { window.open(f.download_url, '_blank'); } finally { showContentLoader(false); } }
    async function singleFolderDownload(f) { selectedItems = [f]; await batchDownload(); clearSelection(); }
    async function batchDownload() {
        const zip = new JSZip(), o = localStorage.getItem('gh_owner'), r = localStorage.getItem('gh_repo'), t = localStorage.getItem('gh_token');
        showContentLoader(true, "打包中...");
        try {
            async function rec(p, z) {
                const res = await fetch(`https://api.github.com/repos/${o}/${r}/contents/${p}`, { headers: t?{'Authorization':`token ${t}`}:{} });
                const items = await res.json();
                for (let i of items) { if(i.type==='dir') await rec(i.path, z.folder(i.name)); else z.file(i.name, await (await fetch(i.download_url)).blob()); }
            }
            for (let s of selectedItems) { if(s.type==='dir') await rec(s.path, zip.folder(s.name)); else zip.file(s.name, await (await fetch(s.download_url)).blob()); }
            saveAs(await zip.generateAsync({type:"blob"}), `backup_${Date.now()}.zip`);
        } finally { showContentLoader(false); }
    }
    function handleSortClick(k) { sortConfig.dir = (sortConfig.key===k && sortConfig.dir==='asc') ? 'desc' : 'asc'; sortConfig.key=k; applySortingAndRender(); }
    function applySortingAndRender() {
        const { key, dir } = sortConfig;
        document.querySelectorAll('.sort-header').forEach(el => el.classList.remove('sort-active'));
        document.querySelectorAll('.sort-icon').forEach(el => el.innerHTML = '');
        const activeHeader = document.getElementById(`header-${key==='modified_at'?'time':(key==='type_label'?'type':key)}`);
        if(activeHeader) { activeHeader.classList.add('sort-active'); activeHeader.querySelector('.sort-icon').innerHTML = dir==='asc'?'↑':'↓'; }
        allFiles.sort((a,b) => {
            if(a.type!==b.type) return a.type==='dir'?-1:1;
            let vA = a[key]||"", vB = b[key]||"";
            if(key==='size') { vA=parseInt(vA)||0; vB=parseInt(vB)||0; }
            if(key==='modified_at') { vA=vA?new Date(vA).getTime():0; vB=vB?new Date(vB).getTime():0; }
            return dir==='asc' ? collator.compare(vA,vB) : collator.compare(vB,vA);
        });
        renderFiles(allFiles);
    }

    async function actionRename(file) { const n = prompt("新名称:", file.name); if(!n || n === file.name) return; showContentLoader(true, "重命名中..."); try { if(file.type==='dir') { async function cp(o, n) { const r = await fetch(`https://api.github.com/repos/${localStorage.getItem('gh_owner')}/${localStorage.getItem('gh_repo')}/contents/${o}`, { headers: { 'Authorization': `token ${localStorage.getItem('gh_token')}` } }); const d = await r.json(); for (let s of d) { if(s.type === 'dir') await cp(s.path, `${n}/${s.name}`); else await fetch(`https://api.github.com/repos/${localStorage.getItem('gh_owner')}/${localStorage.getItem('gh_repo')}/contents/${n}/${s.name}`, { method:'PUT', headers:{'Authorization':`token ${localStorage.getItem('gh_token')}`}, body: JSON.stringify({message:"Rename", content:await blobToBase64(await (await fetch(s.download_url)).blob())}) }); } } await cp(file.path, currentPath ? currentPath+'/'+n : n); } else { await fetch(`https://api.github.com/repos/${localStorage.getItem('gh_owner')}/${localStorage.getItem('gh_repo')}/contents/${currentPath?currentPath+'/'+n:n}`, { method:'PUT', headers:{'Authorization':`token ${localStorage.getItem('gh_token')}`}, body: JSON.stringify({message:"Rename", content:await blobToBase64(await (await fetch(file.download_url)).blob())}) }); } await delRecSimple(file); fetchRepoContents(currentPath); } finally { showContentLoader(false); } }
    async function delRecSimple(item) { const o = localStorage.getItem('gh_owner'), r = localStorage.getItem('gh_repo'), t = localStorage.getItem('gh_token'); if (item.type === 'dir') { const items = await (await fetch(`https://api.github.com/repos/${o}/${r}/contents/${item.path}`, { headers: {'Authorization':`token ${t}`} })).json(); for (let s of items) await delRecSimple(s); } else { await fetch(`https://api.github.com/repos/${o}/${r}/contents/${item.path}`, { method: 'DELETE', headers: { 'Authorization': `token ${t}` }, body: JSON.stringify({ message: "Clean", sha: item.sha }) }); } }
    function handleDelete(i) { if (!confirm(`确定删除 [${i.name}]？`)) return; showContentLoader(true, "删除中..."); delRecSimple(i).then(() => fetchRepoContents(currentPath)).finally(() => showContentLoader(false)); }

    async function submitPasswordUpdate() {
        const userId = document.getElementById('password-user-id').value;
        let oldPassword = document.getElementById('old-password').value;
        const newPassword = document.getElementById('change-password').value;
        const confirmPassword = document.getElementById('change-confirm-password').value;

        // 如果是修改自己的密码，自动使用当前登录密码
        if (currentUser && currentUser.id == userId && currentPassword && !oldPassword) {
            oldPassword = currentPassword;

        if (!userId) {
            alert('用户ID无效');
            return;

        if (!oldPassword) {
            alert('请输入旧密码');
            return;
        }

        if (!newPassword) {
            alert('请输入新密码');
            return;
        }

        if (newPassword !== confirmPassword) {
            alert('两次输入的密码不一致');
            return;
        }

        if (newPassword.length < 4) {
            alert('密码长度至少4位');
            return;
        }

        try {
            const res = await fetch(`/api/users/${userId}/password`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({old_password: oldPassword, new_password: newPassword})
            });
            const data = await res.json();
            if (data.success) {
                alert('密码修改成功，Token已重新加密');

                loadUserList();

                alert(data.error);
            }
        } catch (e) {
            alert('修改密码失败: ' + e.message);
        }

                currentPassword = password;

                localStorage.setItem('logged_user', JSON.stringify(currentUser));
                localStorage.setItem('logged_password', password);

                document.getElementById('owner').value = currentUser.owner || '';
                document.getElementById('repo').value = currentUser.repo || '';
                document.getElementById('token').value = currentUser.token || '';

                showMainContent();

                if (currentUser.owner && currentUser.repo && currentUser.token) {
                    fetchRepoContents('');
                } else {
                    alert('用户未配置GitHub信息，请通过用户管理添加');
                }
            } else {
                alert(data.error);
            }
        } catch (e) {
            alert('登录失败: ' + e.message);
        }
    }

    // --- 登录模式选择 ---
    let loginMode = 'api'; // 'api' 或 'local'
</script>
