<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江西省体育局 - 新闻稿智能撰写助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
.header { background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%); color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
.header .subtitle { font-size: 13px; opacity: 0.85; margin-left: 12px; font-weight: 400; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
@media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

.panel { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
.panel-header { padding: 14px 18px; font-size: 14px; font-weight: 600; background: #fafafa; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.panel-header .toggle { font-size: 10px; color: #999; transition: transform .2s; }
.panel-header .toggle.open { transform: rotate(90deg); }
.panel-body { padding: 18px; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; transition: border .2s; font-family: inherit; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #c0392b; }
.form-group textarea { resize: vertical; min-height: 100px; }
.form-group .hint { font-size: 11px; color: #999; margin-top: 3px; }

.btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 24px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; text-decoration: none; }
.btn-primary { background: #c0392b; color: #fff; }
.btn-primary:hover { background: #a93226; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-secondary { background: #f0f2f5; color: #555; }
.btn-secondary:hover { background: #e4e6e9; }
.btn-sm { padding: 6px 14px; font-size: 12px; }

.result-section { margin-top: 16px; }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.result-header h3 { font-size: 15px; font-weight: 600; }
.result-actions { display: flex; gap: 6px; }
.result-content { padding: 18px; background: #fafafa; border-radius: 8px; border: 1px solid #eee; min-height: 200px; line-height: 1.8; font-size: 14px; white-space: pre-wrap; }
.result-content.loading { display: flex; align-items: center; justify-content: center; color: #999; }
.result-content .placeholder { color: #bbb; text-align: center; padding: 60px 0; }

.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #eee; border-top-color: #c0392b; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 24px; background: #333; color: #fff; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; }

#mainInput { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; line-height: 1.7; outline: none; resize: vertical; min-height: 150px; font-family: inherit; transition: border .2s; }
#mainInput:focus { border-color: #c0392b; }

.error-msg { padding: 12px 16px; background: #fff0f0; border: 1px solid #ffd4d4; border-radius: 6px; color: #c0392b; font-size: 13px; margin-top: 10px; display: none; }
.error-msg.show { display: block; }

.saved-tag { font-size: 11px; color: #27ae60; margin-left: 6px; opacity: 0; transition: opacity .3s; }
.saved-tag.show { opacity: 1; }

.result-content { font-family: "FangSong", "仿宋", serif; line-height: 1.9; font-size: 16pt; color: #222; }
.result-content h2 { font-family: "方正小标宋简体", "FZXiaoBiaoSong-B05S", "SimSun", "宋体", serif; font-size: 18pt; text-align: center; margin-bottom: 18px; line-height: 1.5; }
.result-content p { text-indent: 2em; margin: 0 0 10px 0; text-align: justify; }
.result-content p:first-of-type { margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>江西省体育局 <span class="subtitle">新闻稿智能撰写助手</span></h1>
  </div>
</div>

<div class="container">

  <!-- Left Panel: Config -->
  <div class="panel">
    <div class="panel-header" onclick="toggleConfig()">
      <span>⚙ API 配置</span>
      <span class="toggle open" id="configToggle">▶</span>
    </div>
    <div class="panel-body" id="configBody">
      <div class="form-group">
        <label>API Base URL</label>
        <input type="text" id="apiBaseUrl" placeholder="https://api.deepseek.com/v1">
        <div class="hint">支持 OpenAI 格式的 API 端点</div>
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label>模型</label>
        <input type="text" id="apiModel" placeholder="deepseek-chat">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="saveConfig()" style="flex:1">💾 保存配置</button>
        <button class="btn btn-secondary btn-sm" onclick="clearConfig()" style="flex:1">清除配置</button>
      </div>
      <span class="saved-tag" id="savedTag">✓ 已保存</span>
    </div>
  </div>

  <!-- Right Panel: Main -->
  <div>
    <div class="panel" style="margin-bottom:20px">
      <div class="panel-header">
        <span>📝 撰写新闻稿</span>
      </div>
      <div class="panel-body">
        <textarea id="mainInput" placeholder="请在此输入新闻事实/要点，例如：

5月20日上午，2026年江西省青少年田径锦标赛在南昌市奥林匹克体育中心开幕。本次赛事由江西省体育局、江西省教育厅主办，来自全省11个设区市的1200余名运动员参赛。省体育局副局长XXX出席开幕式并宣布开幕。"></textarea>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
          <div style="font-size:12px;color:#999">
            <span id="charCount">0</span> 字
          </div>
          <button class="btn btn-primary" id="generateBtn" onclick="generate()">
            生成新闻稿
          </button>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="result-section" id="resultSection" style="display:none">
          <div class="result-header">
            <h3>📄 生成的新闻稿</h3>
            <div class="result-actions">
              <button class="btn btn-secondary btn-sm" onclick="copyResult()">📋 复制</button>
              <button class="btn btn-secondary btn-sm" onclick="regenerate()">🔄 重新生成</button>
            </div>
          </div>
          <div class="result-content" id="resultContent">
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="prompt.js"></script>
<script>
// ====== Config ======
function loadConfig() {
  try {
    const saved = localStorage.getItem('jxnews_config');
    if (saved) {
      const cfg = JSON.parse(saved);
      document.getElementById('apiBaseUrl').value = cfg.baseUrl || '';
      document.getElementById('apiKey').value = cfg.apiKey || '';
      document.getElementById('apiModel').value = cfg.model || '';
    }
  } catch(e) {}
}

function saveConfig() {
  const cfg = {
    baseUrl: document.getElementById('apiBaseUrl').value.trim(),
    apiKey: document.getElementById('apiKey').value.trim(),
    model: document.getElementById('apiModel').value.trim(),
    temperature: 0.7,
    maxTokens: 2048,
  };
  if (!cfg.baseUrl) return showToast('请填写 API Base URL');
  if (!cfg.apiKey) return showToast('请填写 API Key');
  if (!cfg.model) return showToast('请填写模型名称');
  localStorage.setItem('jxnews_config', JSON.stringify(cfg));
  showTag();
  showToast('配置已保存');
}

function getConfig() {
  return {
    baseUrl: document.getElementById('apiBaseUrl').value.trim(),
    apiKey: document.getElementById('apiKey').value.trim(),
    model: document.getElementById('apiModel').value.trim(),
    temperature: 0.7,
    maxTokens: 2048,
  };
}

function autoSaveConfig() {
  const cfg = getConfig();
  if (cfg.baseUrl || cfg.apiKey || cfg.model) {
    localStorage.setItem('jxnews_config', JSON.stringify(cfg));
  }
}

function showTag() {
  const tag = document.getElementById('savedTag');
  tag.classList.add('show');
  setTimeout(() => tag.classList.remove('show'), 2000);
}

function clearConfig() {
  localStorage.removeItem('jxnews_config');
  document.getElementById('apiBaseUrl').value = '';
  document.getElementById('apiKey').value = '';
  document.getElementById('apiModel').value = '';
  showToast('配置已清除');
}

function toggleConfig() {
  const body = document.getElementById('configBody');
  const t = document.getElementById('configToggle');
  const show = body.style.display === 'none';
  body.style.display = show ? 'block' : 'none';
  t.classList.toggle('open', show);
}

document.getElementById('mainInput').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length;
});

['apiBaseUrl','apiKey','apiModel'].forEach(id => {
  const el = document.getElementById(id);
  if (el) {
    el.addEventListener('change', autoSaveConfig);
    el.addEventListener('input', autoSaveConfig);
  }
});

// ====== State ======
let isGenerating = false;
let abortController = null;

function renderFormatted(text) {
  if (!text) return '<div class="placeholder">点击「生成新闻稿」开始撰写</div>';
  const blocks = text.split(/\n\n+/);
  const parts = [];
  let titleDone = false;
  for (const block of blocks) {
    const trimmed = block.trim();
    if (!trimmed) continue;
    if (!titleDone && trimmed.length < 80 && !trimmed.endsWith('。') && !trimmed.endsWith('！') && !trimmed.endsWith('？')) {
      parts.push('<h2>' + escapeHtml(trimmed) + '</h2>');
      titleDone = true;
    } else {
      // Split single newlines within a paragraph block
      const lines = trimmed.split('\n').filter(l => l.trim());
      for (const line of lines) {
        parts.push('<p>' + escapeHtml(line.trim()) + '</p>');
      }
    }
  }
  return parts.join('\n');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadConfig();

// ====== Generate ======
async function generate() {
  if (isGenerating) return;

  const input = document.getElementById('mainInput').value.trim();
  if (!input) { showError('请输入新闻事实/要点'); return;   }

  const cfg = getConfig();
  if (!cfg.baseUrl || !cfg.apiKey) {
    showError('请先在左侧面板配置 API Base URL 和 API Key');
    return;
  }

  hideError();

  const systemPrompt = SYSTEM_PROMPT;

  const resultSection = document.getElementById('resultSection');
  const resultContent = document.getElementById('resultContent');
  resultSection.style.display = 'block';
  resultContent.innerHTML = '<div class="loading"><span class="spinner"></span>正在生成新闻稿...</div>';
  resultContent.classList.remove('error');

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '生成中...';
  isGenerating = true;
  abortController = new AbortController();

  let apiUrl = cfg.baseUrl.replace(/\/+$/, '');
  if (!apiUrl.endsWith('/v1')) apiUrl += '/v1';

  try {
    const resp = await fetch(apiUrl + '/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + cfg.apiKey,
      },
      body: JSON.stringify({
        model: cfg.model,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: input },
        ],
        temperature: cfg.temperature,
        max_tokens: cfg.maxTokens,
        stream: true,
      }),
      signal: abortController.signal,
    });

    if (!resp.ok) {
      let errMsg = 'API 请求失败 (' + resp.status + ')';
      try {
        const errData = await resp.json();
        errMsg = errData.error?.message || errMsg;
      } catch(e) {}
      throw new Error(errMsg);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    resultContent.innerHTML = '';
    resultContent.classList.remove('loading');

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed === 'data: [DONE]') continue;
        if (!trimmed.startsWith('data: ')) continue;
        try {
          const json = JSON.parse(trimmed.slice(6));
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            resultContent.innerHTML = renderFormatted(fullText);
          }
        } catch(e) {}
      }
    }

  } catch (e) {
    if (e.name === 'AbortError') {
      resultContent.innerHTML = '<div class="placeholder">已取消生成</div>';
    } else {
      showError(e.message);
      resultContent.innerHTML = '<div class="placeholder">生成失败，请重试</div>';
    }
  }

  btn.disabled = false;
  btn.textContent = '生成新闻稿';
  isGenerating = false;
  abortController = null;
}

function regenerate() {
  if (isGenerating && abortController) {
    abortController.abort();
  }
  // Wait for current cycle to fully settle, then re-generate
  const wait = isGenerating ? 100 : 0;
  setTimeout(() => generate(), wait);
}

async function copyResult() {
  const content = document.getElementById('resultContent');
  const text = content.textContent;
  if (!text || text.includes('点击「生成新闻稿」开始撰写') || text.includes('正在生成')) {
    showToast('没有可复制的内容');
    return;
  }
  try {
    await navigator.clipboard.writeText(text);
    showToast('已复制到剪贴板');
  } catch(e) {
    showToast('复制失败，请手动复制');
  }
}

// ====== Utils ======
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// Ctrl+Enter to generate
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    generate();
  }
});
</script>
</body>
</html>
