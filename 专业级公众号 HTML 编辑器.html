<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专业级公众号 HTML 编辑器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-navy: #00453d; /* 商务深绿 */
            --bg-gray: #f2f4f7;
            --accent-green: #07c160;
            --border-color: #e5e7eb;
            --code-bg: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-gray);
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* 主容器 - 仪表盘布局 */
        .dashboard {
            width: 100%;
            max-width: 1300px;
            height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        /* 顶部统一工具栏 */
        .unified-toolbar {
            height: 64px;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            color: #374151;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            justify-content: center;
        }

        .btn-primary {
            background: var(--primary-navy);
            color: #fff;
            border: none;
        }

        .btn-primary:hover {
            background: #005a50;
            transform: translateY(-1px);
        }

        /* 主工作区：左右对称面板 */
        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px; /* 细边框分割线效果 */
            background-color: var(--border-color);
            overflow: hidden;
        }

        .panel {
            background: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            height: 40px;
            background: #f9fafb;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 12px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 源码编辑器 - 默认显示 */
        #code-editor {
            flex: 1;
            width: 100%;
            padding: 24px;
            background: var(--code-bg);
            color: #a5d6ff;
            border: none;
            outline: none;
            resize: none;
            font-family: "Fira Code", "Consolas", monospace;
            font-size: 14px;
            line-height: 1.6;
            tab-size: 4;
        }

        /* 预览区 - 手机模拟容器 */
        .preview-area {
            flex: 1;
            background: #e5e7eb;
            display: flex;
            justify-content: center;
            overflow-y: auto;
            padding: 40px 0;
        }

        .phone-mockup {
            width: 375px; /* 锁定 135 编辑器标准宽度 */
            min-height: 667px;
            background: #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
        }

        #visual-editor {
            width: 100%;
            min-height: 667px;
            outline: none;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
            word-wrap: break-word;
        }

        /* 解锁 135 编辑限制 */
        #visual-editor, #visual-editor * {
            user-select: text !important;
            -webkit-user-select: text !important;
            cursor: auto !important;
        }

        /* 吐司提示 */
        .toast {
            position: fixed;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }
        .toast.show { top: 30px; }

        /* 移动端适配 */
        @media (max-width: 800px) {
            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
            .unified-toolbar {
                padding: 0 15px;
            }
            .btn span { display: none; }
        }
    </style>
</head>
<body>

<div class="toast" id="toast">已同步至预览视图</div>

<div class="dashboard">
    <header class="unified-toolbar">
        <div class="btn-group">
            <button class="btn btn-icon" onclick="execAction('undo')" title="撤销"><i class="fa-solid fa-rotate-left"></i></button>
            <button class="btn btn-icon" onclick="execAction('redo')" title="重复"><i class="fa-solid fa-rotate-right"></i></button>
            <div style="width:1px; height:20px; background:var(--border-color); margin:0 5px;"></div>
            <button class="btn" onclick="execAction('bold')"><i class="fa-solid fa-bold"></i><span>加粗</span></button>
            <button class="btn" onclick="execAction('italic')"><i class="fa-solid fa-italic"></i><span>斜体</span></button>
        </div>

        <div class="btn-group">
            <button class="btn" onclick="syncView()" id="syncBtn"><i class="fa-solid fa-rotate"></i><span>同步预览</span></button>
            <button class="btn btn-primary" onclick="copyToWechat()"><i class="fa-solid fa-paper-plane"></i><span>复制使用</span></button>
            <button class="btn" onclick="clearEditor()" style="color:#ef4444;"><i class="fa-solid fa-trash-can"></i><span>清空</span></button>
        </div>
    </header>

    <main class="main-content">
        <section class="panel">
            <div class="panel-header">Source Editor</div>
            <textarea id="code-editor" spellcheck="false" placeholder="在此粘贴 135 编辑器 HTML 源码..."></textarea>
        </section>

        <section class="panel">
            <div class="panel-header">Live Preview</div>
            <div class="preview-area">
                <div class="phone-mockup">
                    <div id="visual-editor" contenteditable="true" spellcheck="false"></div>
                </div>
            </div>
        </section>
    </main>
</div>

<div id="hidden-relay" style="position: absolute; left: -9999px; top: -9999px;"></div>

<script>
    const codeEditor = document.getElementById('code-editor');
    const visualEditor = document.getElementById('visual-editor');
    const hiddenRelay = document.getElementById('hidden-relay');
    const toast = document.getElementById('toast');

    // 1. 同步视图功能
    function syncView() {
        visualEditor.innerHTML = codeEditor.value;
        unlock135();
        showToast("已同步至预览视图");
    }

    // 2. 解锁 135 模板的防编辑属性
    function unlock135() {
        const elements = visualEditor.querySelectorAll('[onselectstart], [oncontextmenu], [contenteditable="false"]');
        elements.forEach(el => {
            el.removeAttribute('onselectstart');
            el.removeAttribute('oncontextmenu');
            if (el.getAttribute('contenteditable') === 'false') {
                el.removeAttribute('contenteditable');
            }
        });
    }

    // 3. 执行撤销、重复、加粗等动作
    function execAction(cmd) {
        // 如果在代码框有焦点，执行原生 textarea 动作，否则执行可视化区动作
        if (document.activeElement === codeEditor) {
            codeEditor.focus();
            document.execCommand(cmd, false, null);
        } else {
            document.execCommand(cmd, false, null);
            visualEditor.focus();
        }
    }

    // 4. 图片双击替换
    visualEditor.addEventListener('dblclick', function(e) {
        if (e.target.tagName === 'IMG') {
            const currentSrc = e.target.src;
            const newSrc = prompt("请输入新的图片链接 (URL):", currentSrc);
            if (newSrc && newSrc !== currentSrc) {
                e.target.src = newSrc;
                // 反向同步到代码框
                codeEditor.value = visualEditor.innerHTML;
                showToast("图片已更新并同步源码");
            }
        }
    });

    // 5. ✨ 强力无损复制 (核心技术：拦截系统剪贴板)
    function copyToWechat() {
        // 复制前先确保同步一次
        visualEditor.innerHTML = codeEditor.value;
        unlock135();
        
        const htmlContent = visualEditor.innerHTML;
        // 封装微信安全沙箱外壳
        const finalHtml = `<section style="box-sizing: border-box; width: 100%; overflow-x: hidden; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei UI', 'Microsoft YaHei', Arial, sans-serif; font-size: 15px; color: #333;">${htmlContent}</section>`;

        function listener(e) {
            e.clipboardData.setData('text/html', finalHtml);
            e.clipboardData.setData('text/plain', finalHtml);
            e.preventDefault();
        }

        document.addEventListener('copy', listener);
        try {
            document.execCommand('copy');
            showToast("✨ 复制成功！请前往公众号后台粘贴");
        } catch (err) {
            showToast("复制失败，请尝试手动选中预览区复制");
        }
        document.removeEventListener('copy', listener);
    }

    // 6. 清空
    function clearEditor() {
        if (confirm("确定要清空所有内容吗？")) {
            codeEditor.value = "";
            visualEditor.innerHTML = "";
            showToast("编辑器已重置");
        }
    }

    // 7. Toast 逻辑
    function showToast(msg) {
        toast.innerText = msg;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    // 自动聚焦代码框
    window.onload = () => {
        codeEditor.focus();
    };
</script>

</body>
</html>
